<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Mode Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/security.js"></script>
  <script src="js/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 2rem;
      color: #38bdf8;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1.5rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.5rem;
    }

    .card h2 {
      font-size: 1.1rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
      text-align: center;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 0.3rem;
    }

    select, input[type="number"] {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 0.55rem 0.75rem;
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }

    button {
      width: 100%;
      padding: 0.65rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }

    .btn-admin   { background: #f59e0b; color: #0f172a; }
    .btn-checkout { background: #22c55e; color: #0f172a; }

    .result {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      line-height: 1.5;
      display: none;
    }
    .result.show { display: block; }
    .result.success { background: #166534; border: 1px solid #22c55e; color: #bbf7d0; }
    .result.error   { background: #7f1d1d; border: 1px solid #ef4444; color: #fecaca; }

    /* ── Users table ────────────────── */
    .users-table {
      max-width: 900px;
      margin: 2rem auto 0;
    }

    .users-table h2 {
      font-size: 1rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 0.65rem 1rem;
      text-align: left;
      font-size: 0.9rem;
    }

    th {
      background: #334155;
      color: #94a3b8;
      font-weight: 600;
    }

    tr:not(:last-child) td { border-bottom: 1px solid #334155; }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .badge.on  { background: #166534; color: #86efac; }
    .badge.off { background: #374151; color: #9ca3af; }
  </style>
</head>
<body>

  <h1>Free Mode — Demo Dashboard</h1>

  <div class="grid">

    <!-- ── Admin Panel ── -->
    <div class="card">
      <h2>Admin — Toggle Free Mode</h2>

      <label for="adminUserSelect">Select User</label>
      <select id="adminUserSelect">
        <option value="">Loading...</option>
      </select>

      <button class="btn-admin" onclick="toggleFreeMode()">Toggle Free Mode</button>

      <div id="adminResult" class="result"></div>
    </div>

    <!-- ── Checkout Panel ── -->
    <div class="card">
      <h2>Checkout — Place Order</h2>

      <label for="checkoutUserSelect">Select User</label>
      <select id="checkoutUserSelect">
        <option value="">Loading...</option>
      </select>

      <label for="orderTotal">Order Total (GHS)</label>
      <input type="number" id="orderTotal" value="25.00" min="0.01" step="0.01" />

      <button class="btn-checkout" onclick="placeOrder()">Place Order</button>

      <div id="checkoutResult" class="result"></div>
    </div>

  </div>

  <!-- ── Live User Table ── -->
  <div class="users-table">
    <h2>Live User State</h2>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Free Mode</th>
          <th>Balance Owed (GHS)</th>
        </tr>
      </thead>
      <tbody id="usersTableBody">
        <tr><td colspan="4">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    const USER_COLUMNS = 'id, first_name, last_name, role, is_free_mode, balance_owed';
    let usersCache = [];

    function formatName(user) {
      const first = (user.first_name || '').trim();
      const last = (user.last_name || '').trim();
      const fullName = `${first} ${last}`.trim();
      return fullName || `User ${String(user.id).slice(0, 8)}`;
    }

    function shortId(id) {
      return String(id).slice(0, 8);
    }

    async function requireAdminAccess() {
      if (!window.supabase) {
        showResult('adminResult', 'Supabase not initialized.', true);
        return false;
      }

      const { data: authData, error: authError } = await window.supabase.auth.getUser();
      if (authError || !authData?.user) {
        window.location.href = 'login.html';
        return false;
      }

      const { data: me, error: meError } = await window.supabase
        .from('users')
        .select('role')
        .eq('id', authData.user.id)
        .single();

      if (meError || me?.role !== 'admin') {
        showResult('adminResult', 'Access denied. Admin only page.', true);
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 900);
        return false;
      }

      return true;
    }

    // ── Helpers ──────────────────────────────────────────────────────────
    function showResult(elementId, message, isError = false) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.className = `result show ${isError ? 'error' : 'success'}`;
    }

    function populateSelect(selectId, users) {
      const sel = document.getElementById(selectId);
      sel.innerHTML = users.map(u =>
        `<option value="${u.id}">${formatName(u)} (ID: ${shortId(u.id)})</option>`
      ).join('');
    }

    function renderTable(users) {
      const tbody = document.getElementById('usersTableBody');
      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="4">No users found.</td></tr>';
        return;
      }

      tbody.innerHTML = users.map(u => `
        <tr>
          <td>${shortId(u.id)}</td>
          <td>${formatName(u)}</td>
          <td><span class="badge ${u.is_free_mode ? 'on' : 'off'}">${u.is_free_mode ? 'ON' : 'OFF'}</span></td>
          <td>${Number(u.balance_owed || 0).toFixed(2)}</td>
        </tr>
      `).join('');
    }

    // ── Load Users ───────────────────────────────────────────────────────
    async function loadUsers() {
      try {
        const { data: users, error } = await window.supabase
          .from('users')
          .select(USER_COLUMNS)
          .order('first_name', { ascending: true });

        if (error) throw error;

        usersCache = users || [];
        populateSelect('adminUserSelect', users);
        populateSelect('checkoutUserSelect', users);
        renderTable(users);
      } catch (err) {
        showResult('adminResult', `Failed to load users: ${err.message}`, true);
      }
    }

    // ── Toggle Free Mode ─────────────────────────────────────────────────
    async function toggleFreeMode() {
      const userId = document.getElementById('adminUserSelect').value;
      if (!userId) return;

      try {
        const { data, error } = await window.supabase.rpc('free_mode_account_action', {
          p_user_id: userId,
          p_action: 'toggle',
          p_order_total: null,
        });

        if (error) {
          showResult('adminResult', error.message, true);
          return;
        }

        showResult('adminResult', data.message || 'Free Mode updated.');
        await loadUsers();
      } catch (err) {
        showResult('adminResult', `Request failed: ${err.message}`, true);
      }
    }

    // ── Place Order ──────────────────────────────────────────────────────
    async function placeOrder() {
      const userId    = document.getElementById('checkoutUserSelect').value;
      const orderTotal = parseFloat(document.getElementById('orderTotal').value);

      if (!userId || isNaN(orderTotal) || orderTotal <= 0) {
        showResult('checkoutResult', 'Please select a user and enter a valid order total.', true);
        return;
      }

      try {
        const { data, error } = await window.supabase.rpc('free_mode_account_action', {
          p_user_id: userId,
          p_action: 'checkout',
          p_order_total: orderTotal,
        });

        if (error) {
          showResult('checkoutResult', error.message, true);
          return;
        }

        const detail = data.free_mode
          ? `${data.message} New Balance Owed: GHS ${Number(data.new_balance_owed || 0).toFixed(2)}`
          : (data.message || 'Checkout completed.');

        showResult('checkoutResult', detail);
        await loadUsers();
      } catch (err) {
        showResult('checkoutResult', `Request failed: ${err.message}`, true);
      }
    }

    // ── Init ─────────────────────────────────────────────────────────────
    (async () => {
      const ok = await requireAdminAccess();
      if (!ok) return;
      await loadUsers();
    })();
  </script>

</body>
</html>
