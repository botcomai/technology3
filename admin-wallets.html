<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet Control | Data4Ghana Admin</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/master-dashboard.css">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/supabase.js"></script>
    
    <meta name="theme-color" content="#020817">
</head>
<body>
    
    <div id="admin-sidebar-container"></div>
    
    <main class="master-main">
        <header class="top-nav" style="position: relative;">
            <div style="display:flex; align-items:center; gap:16px; z-index: 2; position: relative;">
                <button class="admin-menu-btn" onclick="toggleAdminMenu()">☰</button>
            </div>
            
            <div class="page-title-group" style="position: absolute; left: 0; right: 0; text-align: center; pointer-events: none; z-index: 1;">
                <h1 id="pageTitle" style="pointer-events: auto;">Wallet Control</h1>
            </div>
            
            <div class="admin-profile" style="z-index: 2; position: relative;">
                <span class="status-live">System Active</span>
            </div>
        </header>

        <div id="tab-wallets" class="tab-content active">
            <!-- Wallet Metrics -->
            <div class="metrics-hero force-grid-2" style="display: grid; grid-template-columns: repeat(2, minmax(200px, 400px)); row-gap: 24px; column-gap: 40px; margin-bottom: 40px; justify-content: center;">
                <div class="metric-text-group" style="background:var(--bg-dark); border:1px solid var(--glass-border); border-radius:12px; padding:24px 20px; text-align:center;">
                    <div class="label" style="margin-bottom:8px;">System Liability</div>
                    <div class="huge-number" id="walletMetricTotal" style="font-size: 32px; color:white;">₵0.00</div>
                </div>
                <div class="metric-text-group" style="background:var(--bg-dark); border:1px solid var(--glass-border); border-radius:12px; padding:24px 20px; text-align:center;">
                    <div class="label" style="margin-bottom:8px; color:var(--emerald);">Credits (Today)</div>
                    <div class="huge-number text-emerald" id="walletMetricCredits" style="font-size: 32px;">₵0.00</div>
                </div>
                <div class="metric-text-group" style="background:var(--bg-dark); border:1px solid var(--glass-border); border-radius:12px; padding:24px 20px; text-align:center;">
                    <div class="label" style="margin-bottom:8px; color:#ef4444;">Debits (Today)</div>
                    <div class="huge-number" id="walletMetricDebits" style="font-size: 32px; color:#ef4444;">₵0.00</div>
                </div>
                <div class="metric-text-group" style="background:var(--bg-dark); border:1px solid var(--glass-border); border-radius:12px; padding:24px 20px; text-align:center;">
                    <div class="label" style="margin-bottom:8px; color:var(--blue);">Pending Funding</div>
                    <div class="huge-number text-blue" id="walletMetricPending" style="font-size: 32px;">₵0.00</div>
                </div>
            </div>

            <div class="minimal-header" style="text-align: center; margin-bottom: 24px;">
                <p>Real-time audit of all wallet movements.</p>
                <div style="margin-top: 24px; display: flex; justify-content: center; gap: 12px; align-items: center;">
                    <button class="btn-primary" onclick="openGlobalWalletModal('credit')" style="background:var(--blue); color:white; border:none; padding:12px 24px; border-radius:8px; font-weight:700; cursor:pointer;">
                        + Manual Adjustment
                    </button>
                    <button class="btn-secondary" onclick="refreshWalletDashboard()" style="background:rgba(255,255,255,0.05); color:white; border:1px solid var(--glass-border); padding:12px 16px; border-radius:8px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:8px;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                    </button>
                </div>
            </div>

            <!-- Search Bar -->
            <div style="background:var(--bg-dark); border:1px solid var(--glass-border); border-radius:12px; padding:12px 20px; margin-bottom:24px; display:flex; gap:12px; align-items:center;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-muted); flex-shrink:0;"><circle cx="11" cy="11" r="8"></circle><path d="M21 21l-4.35-4.35"></path></svg>
                <input type="text" id="walletSearchInput" oninput="filterWalletTransactions()" placeholder="Search username or type..." style="flex:1; background:transparent; border:none; color:white; outline:none; font-size:14px;">
            </div>

            <div class="table-responsive mt-6" style="max-height:60vh; overflow:auto; border-bottom:1px solid var(--glass-border);">
                <table class="master-table">
                    <thead>
                        <tr>
                            <th style="position:sticky; top:0; background:var(--bg-dark); z-index:10; white-space:nowrap; width:120px;">Date</th>
                            <th style="position:sticky; top:0; background:var(--bg-dark); z-index:10; white-space:nowrap; width:220px;">Username</th>
                            <th style="position:sticky; top:0; background:var(--bg-dark); z-index:10; white-space:nowrap; width:150px;">Reference</th>
                            <th style="position:sticky; top:0; background:var(--bg-dark); z-index:10; white-space:nowrap; text-align:left;">Amount & Balances</th>
                        </tr>
                    </thead>
                    <tbody id="walletTransactionsTableBody">
                        <!-- Injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/admin-core.js"></script>
    <script src="js/admin-menu.js"></script>
    <script src="js/admin-modals.js"></script>
    <script src="js/admin-wallets.js"></script>
</body>
</html>
