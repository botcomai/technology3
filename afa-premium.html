<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium AFA Setup</title>
  
  <link rel="stylesheet" href="css/menu.css">
  <link rel="stylesheet" href="css/afa.css">
  <!-- Use transactions.css for the history table styling -->
  <link rel="stylesheet" href="css/transactions.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/security.js"></script>
    <meta name="theme-color" content="#0b1220">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Data4Ghana">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="images/icons/apple-touch-icon.png">
</head>

    <body class="afa-page">
    <div id="menu-container"></div>
    <button class="menu-btn" onclick="openMenu()">☰</button>
    
    <div class="main-content">
        <!-- HERO BANNER -->
        <div class="afa-hero normal">
            <div class="hero-content">
                <a href="afa.html" class="back-dashboard-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    Back to AFA Portal
                </a>
                <h1>Enterprise Provisioning</h1>
                <p>High-priority registration path for enterprise-scale field operations.</p>
            </div>
            <div class="hero-stats">
                <div class="stat-item">
                    <span class="stat-label">System Credit</span>
                    <span class="stat-value" id="afaWalletDisplay">₵0.00</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-label">Total Registered</span>
                    <span class="stat-value" id="totalAfaCount">0</span>
                </div>
            </div>
        </div>

        <div class="container container-premium">
                <!-- REGISTRATION FORM -->
                <div class="form-card card checkout-main" style="width: 100%;">
                    <div class="form-header">
                        <div class="form-title-group">
                            <h3>Enrollment Details</h3>
                        </div>
                    </div>

                    <!-- Role-Based Registration Fee -->
                    <div id="premiumFeeBox" style="
                        display: flex;
                        align-items: center;
                        justify-content: space-between;
                        background: rgba(16, 185, 129, 0.08);
                        border: 1px solid rgba(16, 185, 129, 0.25);
                        border-radius: 14px;
                        padding: 16px 20px;
                        margin-bottom: 24px;
                    ">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <div style="
                                width: 38px; height: 38px; border-radius: 10px;
                                background: rgba(16,185,129,0.15);
                                display: flex; align-items: center; justify-content: center;
                            ">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                            </div>
                            <div>
                                <div style="font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600;">Registration Fee</div>
                                <div style="font-size: 11px; color: #475569; margin-top: 2px;">Based on your account role</div>
                            </div>
                        </div>
                        <div style="text-align: right;">
                            <div id="premiumFeeAmount" style="font-size: 26px; font-weight: 800; color: #10b981; letter-spacing: -0.5px;">₵--</div>
                            <div id="premiumFeeRole" style="font-size: 11px; color: #64748b; margin-top: 2px; text-transform: capitalize;">Loading...</div>
                        </div>
                    </div>

                    <form id="premiumAfaForm">
                        <div class="afa-grid">
                            <div class="input-group">
                                <label>Beneficiary Full Name</label>
                                <input type="text" id="pName" placeholder="Enter legal name" required>
                            </div>
                            <div class="input-group">
                                <label>Activation Phone Number</label>
                                <input type="text" id="pPhone" placeholder="05XXXXXXXX" required>
                            </div>
                            <div class="input-group">
                                <label>Identification Type</label>
                                <select id="pIdType" required>
                                    <option value="">Select ID Type</option>
                                    <option>Ghana Card</option>
                                    <option>Passport</option>
                                    <option>Driver License</option>
                                    <option>Voter ID</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label>ID Card Number</label>
                                <input type="text" id="pIdNumber" placeholder="GHA-XXXXXXX-X" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label>Location (Region/City)</label>
                            <input type="text" id="pLocation" placeholder="e.g. Accra, Greater Accra" required>
                        </div>
                        <div class="input-group" style="margin-bottom: 30px;">
                            <label>Date of Birth</label>
                            <input type="date" id="pDob" required>
                        </div>
                        
                        <button type="submit" class="pay-btn premium-btn" id="submitBtn">
                            <span class="btn-text">Proceed to Activation</span>
                            <svg class="btn-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                        </button>
                        <p class="form-footer-note">🛡️ 256-bit SSL Secure Enrollment</p>
                    </form>
                </div>
        </div>
    </div>

  <script src="js/menu.js"></script>
  <script src="js/afa-premium.js"></script>

    <script src="js/pwa-install.js"></script>
</body>
</html>
